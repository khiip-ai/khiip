# Pre-commit hooks for github.com/khiip-ai/khiip (public AGPL-3.0 repo).
#
# Three hooks, all blocking:
#  1. gitleaks            — generic secret-scanner; covers .env-style leaks, API tokens, etc.
#  2. khiip-path-guard    — regex blocking internal-only paths that belong in
#                            the companion private repo github.com/khiip-ai/internal.
#  3. no-claude-coauthor  — block `Co-Authored-By: Claude*` trailers in commit messages.
#                            Project norm 2026-05-19: AI co-authorship is not recorded
#                            in this project's git history.
#
# After cloning, run BOTH:
#   pre-commit install                          # default pre-commit stage
#   pre-commit install --hook-type commit-msg   # commit-msg stage (for no-claude-coauthor)
#
# CI runs path-guard server-side via .github/workflows/path-guard.yml
# and the no-coauthor scan via .github/workflows/no-claude-coauthor.yml.

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: khiip-path-guard
        name: Block internal-only paths from public repo
        entry: _scripts/path-guard.sh
        language: script
        pass_filenames: false
        stages: [pre-commit]

      - id: no-claude-coauthor
        name: Block Co-Authored-By Claude trailers
        entry: _scripts/no-claude-coauthor.sh
        language: script
        stages: [commit-msg]
